<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Advertisement</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
        }
        .form-card {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #dc3545;
            margin-bottom: 30px;
            text-align: center;
        }
        .warning {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
        }
        .ad-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
        }
        .ad-info p {
            margin: 10px 0;
            font-size: 1.1em;
        }
        .ad-info strong {
            color: #667eea;
        }
        .ad-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .btn-group {
            display: flex;
            gap: 15px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>🗑️ Delete Advertisement</h1>
            
            <div class="warning">
                <strong>⚠️ Warning:</strong> This action cannot be undone!
            </div>

            <div class="ad-info">
                <p><strong>Title:</strong> {{ ad.title }}</p>
                <p><strong>Status:</strong> {% if ad.is_active %}Active{% else %}Inactive{% endif %}</p>
                {% if ad.link %}
                <p><strong>Link:</strong> {{ ad.link }}</p>
                {% endif %}
                {% if ad.image %}
                <p><strong>Image:</strong></p>
                <img src="{{ ad.image.url }}" alt="{{ ad.title }}" class="ad-image">
                {% endif %}
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="btn-group">
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'lottery:admin_dashboard' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
